<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aplikasi UC</title>
  </head>

  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0fdfa,#e0f2fe);">
        <div style="text-align:center;color:#0f766e;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica Neue,Arial,Noto Sans,sans-serif;">
          <div style="width:48px;height:48px;border-radius:9999px;border-bottom:2px solid #0f766e;margin:0 auto 12px;animation:spin 1s linear infinite"></div>
          <p style="font-weight:600">Memuat Aplikasi...</p>
          <p style="font-size:12px;color:#64748b;margin-top:8px">Jika macet, coba buka <a href="/debug" style="color:#dc2626;text-decoration:underline">/debug</a></p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      <script>
        window.addEventListener('error', function(e){
          const msg = 'Runtime error: ' + (e.message || 'unknown');
          const loc = (e.filename || '') + (e.lineno? ':'+e.lineno: '');
          document.body.innerHTML = '<div style="padding:24px;font-family:ui-sans-serif,system-ui;">'+
            '<h2 style="color:#b91c1c;">'+msg+'</h2>'+
            '<p style="color:#334155;">'+loc+'</p>'+
            '<p><a href="/debug" style="color:#dc2626;text-decoration:underline">Buka /debug</a> atau <a href="/health.html" style="text-decoration:underline">/health.html</a></p>'+
          '</div>';
        });
        window.addEventListener('unhandledrejection', function(e){
          const reason = e.reason && (e.reason.message || e.reason.toString());
          document.body.innerHTML = '<div style="padding:24px;font-family:ui-sans-serif,system-ui;">'+
            '<h2 style="color:#b91c1c;">Unhandled Promise Rejection</h2>'+
            '<pre style="white-space:pre-wrap;background:#f1f5f9;padding:12px;border-radius:8px;">'+reason+'</pre>'+
            '<p><a href="/debug" style="color:#dc2626;text-decoration:underline">Buka /debug</a> atau <a href="/health.html" style="text-decoration:underline">/health.html</a></p>'+
          '</div>';
        });
      </script>
      <noscript>
        <div style="padding:16px;text-align:center">Aplikasi ini memerlukan JavaScript. Silakan aktifkan JavaScript pada browser Anda.</div>
      </noscript>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
