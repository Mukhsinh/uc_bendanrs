<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aplikasi UC</title>
  </head>

  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0fdfa,#e0f2fe);">
        <div style="text-align:center;color:#0f766e;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica Neue,Arial,Noto Sans,sans-serif;">
          <div style="width:48px;height:48px;border-radius:9999px;border-bottom:2px solid #0f766e;margin:0 auto 12px;animation:spin 1s linear infinite"></div>
          <p style="font-weight:600">Memuat Aplikasi...</p>
          <p style="font-size:12px;color:#64748b;margin-top:8px">Jika macet, coba buka <a href="/debug" style="color:#dc2626;text-decoration:underline">/debug</a></p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      <noscript>
        <div style="padding:16px;text-align:center">Aplikasi ini memerlukan JavaScript. Silakan aktifkan JavaScript pada browser Anda.</div>
      </noscript>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
